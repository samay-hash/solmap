[toolchain]

[features]
resolution = true
skip-lint = false

[programs.localnet]
chaos_world = "ChaosWorLd111111111111111111111111111111111"

[programs.devnet]
chaos_world = "ChaosWorLd111111111111111111111111111111111"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "npx ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[workspace]
members = ["programs/chaos_world"]
